name: CI

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
          enable-cache: true
      - run: uv sync

      - name: Get changed source files
        id: changed
        run: |
          git fetch origin main
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="origin/${{ github.base_ref }}"
          else
            BASE="origin/main"
          fi
          FILES=$(git diff --name-only "$BASE"..HEAD \
            | grep -E '^(extract|push)/.*\.py$' \
            | grep -v '/tests/' \
            | tr '\n' ' ')
          echo "files=$FILES" >> $GITHUB_OUTPUT

      - name: Run unit tests
        run: |
          if [ -z "${{ steps.changed.outputs.files }}" ]; then
            echo "No file filter — running all tests"
            uv run pytest -v --ignore-glob="**/test_fuzz.py" --ignore-glob="**/test_e2e*.py"
          else
            echo "Running tests for affected modules..."
            MODULES=$(echo "${{ steps.changed.outputs.files }}" | tr ' ' '\n' | cut -d/ -f1 | sort -u | tr '\n' ' ')
            TEST_DIRS=""
            for mod in $MODULES; do
              if [ -d "${mod}/tests" ]; then
                TEST_DIRS+=" ${mod}/tests/"
              fi
            done
            if [ -n "$TEST_DIRS" ]; then
              uv run pytest -v $TEST_DIRS --ignore-glob="**/test_fuzz.py" --ignore-glob="**/test_e2e*.py"
            else
              echo "No test directories found for affected modules"
            fi
          fi

  fuzz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
          enable-cache: true
      - run: uv sync

      - name: Get changed source files
        id: changed
        run: |
          git fetch origin main
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="origin/${{ github.base_ref }}"
          else
            BASE="origin/main"
          fi
          FILES=$(git diff --name-only "$BASE"..HEAD \
            | grep -E '^(extract|push)/.*\.py$' \
            | grep -v '/tests/' \
            | tr '\n' ' ')
          echo "files=$FILES" >> $GITHUB_OUTPUT

      - name: Run fuzz tests
        if: steps.changed.outputs.files != ''
        run: |
          MODULES=$(echo "${{ steps.changed.outputs.files }}" | tr ' ' '\n' | cut -d/ -f1 | sort -u | tr '\n' ' ')
          for mod in $MODULES; do
            if [ -f "${mod}/tests/test_fuzz.py" ]; then
              echo "Running fuzz tests for ${mod}..."
              uv run python "${mod}/tests/test_fuzz.py" -runs=10000
            fi
          done

  mutation:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
          enable-cache: true
      - run: uv sync

      - name: Get changed source files
        id: changed
        run: |
          git fetch origin main
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="origin/${{ github.base_ref }}"
          else
            BASE="origin/main"
          fi
          FILES=$(git diff --name-only "$BASE"..HEAD \
            | grep -E '^(extract|push)/.*\.py$' \
            | grep -v '/tests/' \
            | tr '\n' ' ')
          if [ -z "$FILES" ]; then
            echo "No Python source files changed — skipping mutation"
          else
            echo "Mutating: $FILES"
          fi
          echo "files=$FILES" >> $GITHUB_OUTPUT

      - name: Run mutation CI
        if: steps.changed.outputs.files != ''
        run: uv run bash scripts/run_mutation_ci.sh 85 ${{ steps.changed.outputs.files }}

  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
          enable-cache: true
      - run: uv sync

      - name: Get changed source files
        id: changed
        run: |
          git fetch origin main
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="origin/${{ github.base_ref }}"
          else
            BASE="origin/main"
          fi
          FILES=$(git diff --name-only "$BASE"..HEAD \
            | grep -E '^(extract|push)/.*\.py$' \
            | grep -v '/tests/' \
            | tr '\n' ' ')
          echo "files=$FILES" >> $GITHUB_OUTPUT

      - name: Run quality checks
        if: steps.changed.outputs.files != ''
        run: uv run bash scripts/run_quality_ci.sh ${{ steps.changed.outputs.files }}

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
          enable-cache: true
      - run: uv sync
      - run: uv run pytest -v extract/tests/test_e2e.py extract/tests/test_e2e_errors.py extract/tests/test_e2e_retry.py push/tests/test_e2e_upload.py push/tests/test_e2e_client.py
