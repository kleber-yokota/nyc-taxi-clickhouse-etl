[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "nyc-taxi-clickhouse-etl"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "astroid>=4.1.2",
    "requests>=2.31",
]

[project.optional-dependencies]
test = [
    "pytest>=7.0",
    "hypothesis>=6.0",
    "mutmut>=3.0",
    "atheris>=3.0",
    "coverage>=7.0",
    "responses>=0.23",
    "vcrpy>=5.0",
]

[tool.hypothesis]
max_examples = 30
deadline = 2000

[tool.setuptools.packages.find]
exclude = ["mutants*"]

[tool.mutmut]
paths_to_mutate = ["extract"]
do_not_mutate = ["*/tests/*", "*/conftest.py", "*/test_*.py"]
runner = "python -m pytest"
test_dir = "tests"
exclude_dirs = ["__pycache__", ".venv", "mutants"]
debug = "false"

[dependency-groups]
dev = [
    "atheris>=3.0",
    "coverage>=7.0",
    "hypothesis>=6.0",
    "mutmut>=3.0",
    "pytest>=7.0",
    "responses>=0.23",
    "testcontainers>=4.5",
    "vcrpy>=5.0",
    "pytest-recording>=0.13",
]
