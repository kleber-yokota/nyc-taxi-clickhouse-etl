[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "nyc-taxi-clickhouse-etl"
version = "0.1.0"
requires-python = ">=3.11"

[tool.setuptools.packages.find]
exclude = ["mutants*", "data*"]

[tool.mutmut]
paths_to_mutate = ["push"]
do_not_mutate = ["*/tests/*", "*/conftest.py", "*/test_*.py", "*/__init__.py"]
runner = "python -m pytest push/tests/test_checksum.py push/tests/test_core_env.py push/tests/test_state.py push/tests/test_core_upload.py push/tests/test_delete_after.py push/tests/test_filter.py -q"
exclude_dirs = ["__pycache__", ".venv", "mutants"]
