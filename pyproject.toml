[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "nyc-taxi-clickhouse-etl"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "astroid>=4.1.2",
    "boto3>=1.43.2",
    "minio>=7.2.20",
    "python-dotenv>=1.2.2",
    "requests>=2.31",
]

[project.optional-dependencies]
test = [
    "pytest>=7.0",
    "hypothesis>=6.0",
    "mutmut>=3.0",
    "atheris>=3.0",
    "coverage>=7.0",
    "responses>=0.23",
    "vcrpy>=5.0",
]

[tool.hypothesis]
max_examples = 30
deadline = 2000

[tool.setuptools.packages.find]
include = ["extract*", "push*"]

[tool.mutmut]
# Auto-generated by scripts/run_mutation_ci.sh — do not edit manually
paths_to_mutate = ["."]
do_not_mutate = ["*/tests/*", "*/conftest.py", "*/test_*.py", "*/__init__.py"]
exclude_dirs = ["__pycache__", ".venv", "mutants"]

[dependency-groups]
dev = [
    "atheris>=3.0",
    "coverage>=7.0",
    "hypothesis>=6.0",
    "mutmut>=3.0",
    "pytest>=7.0",
    "responses>=0.23",
    "testcontainers>=4.5",
    "vcrpy>=5.0",
    "pytest-recording>=0.13",
    "radon>=6.0.1",
    "xenon>=0.9.3",
    "vulture>=2.16",
    "cohesion>=1.2.0",
]
