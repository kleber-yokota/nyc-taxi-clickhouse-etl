[metadata]
name = nyc-taxi-clickhouse-etl
version = 0.1.0

[options]
packages = find:
python_requires = >=3.11

[options.packages.find]
exclude =
    mutants*

[mutmut]
paths_to_mutate = extract/
do_not_mutate =
    **/__init__.py
    **/test_*.py
    **/conftest.py
    **/exceptions.py
    **/config.py
tests_dir = extract/core/tests/

[tool:pytest]
testpaths = extract/core/tests/
addopts = --ignore=extract/core/tests/test_fuzz.py
